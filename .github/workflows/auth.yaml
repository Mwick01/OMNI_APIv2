name: 1. WhatsApp Auth (run once)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auth:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm install

      - name: Show QR — scan within 60 seconds
        run: node run_once_auth.js
        timeout-minutes: 3
        env:
          WHATSAPP_CHANNEL_ID: ${{ secrets.WHATSAPP_CHANNEL_ID }}

      - name: Commit session to repo
        run: |
          git config user.email "bot@github.com"
          git config user.name "Notice Bot"
          git add -f auth_info/
          git commit -m "Update Baileys session" || echo "No changes"
          git push